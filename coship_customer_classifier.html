:root {

  --color-navy: #0F1B3D;
  --color-orange: #F47C42;
  --color-success: #1F7A3A;
  --color-bg: #F7F6F2;
  --color-surface: #FFFFFF;
  --color-border: #EAE8DF;
  --color-border-strong: #D5D2C6;
  --color-text: #1A1A1A;
  --color-text-secondary: #5A5A5A;
  --color-text-muted: #8E8E8E;
  --color-kakao: #FAE100;
  --color-kakao-text: #391B1B;

  --shadow-md: 0 6px 16px rgba(15, 27, 61, 0.08);
  --shadow-lg: 0 16px 32px rgba(15, 27, 61, 0.10);
  --radius: 16px;
  --radius-sm: 12px;
}

html, body { height: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", system-ui, sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

.app {
  max-width: 560px;
  margin: 0 auto;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  background: var(--color-bg);
  position: relative;
}

.header {
  padding: 16px 20px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--color-border);
  background: var(--color-surface);
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 800;
  font-size: 17px;
  letter-spacing: -0.02em;
  color: var(--color-navy);
}

.logo-mark {
  width: 28px;
  height: 28px;
  background: var(--color-primary);
  color: white;
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 900;
  font-size: 13px;
  letter-spacing: -0.05em;
}

.header-label {
  font-size: 12px;
  color: var(--color-text-secondary);
  font-weight: 600;
  letter-spacing: -0.01em;
}

.progress-bar {

  gap: 4px;
  padding: 14px 20px 6px;
  background: var(--color-surface);
}

.progress-dot {

  height: 3px;
  border-radius: 2px;
  background: var(--color-border);

}

.progress-dot.done { background: var(--color-primary); }
.progress-dot.active { background: var(--color-primary); }

.back-btn {

  align-items: center;
  gap: 4px;
  margin: 14px 20px 0;
  padding: 7px 12px 7px 10px;
  background: var(--color-surface);
  border: 1px solid var(--color-border-strong);
  border-radius: 999px;
  font-size: 12px;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-family: inherit;
  font-weight: 600;
  transition: all 0.15s;
  align-self: flex-start;
}

.back-btn:hover {
  background: var(--color-bg);
  color: var(--color-text);
  border-color: var(--color-text-muted);
}

.back-btn:active { transform: scale(0.96); }

.content {
  flex: 1;
  padding: 24px 20px 28px;
  animation: fadeUp 0.32s ease-out;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.eyebrow {

  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.08em;
  color: var(--color-primary);
  margin-bottom: 12px;
  text-transform: uppercase;
}

.eyebrow-ko {
  display: inline-block;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--color-primary);
  margin-bottom: 14px;

  padding: 4px 10px;
  border-radius: 999px;
}

.question {

  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--color-navy);
  line-height: 1.32;
  margin-bottom: 8px;
}

.question-sub {

  color: var(--color-text-secondary);
  margin-bottom: 24px;
  line-height: 1.55;
}

.question + .options { margin-top: 24px; }

.options {

  flex-direction: column;
  gap: 10px;
}

.option {

  font-weight: 700;
  color: var(--color-text);

  letter-spacing: -0.015em;
}

  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.option:active { transform: scale(0.985); }

.option-content { flex: 1; }

.option-meta {

  font-size: 12.5px;
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-top: 3px;
  letter-spacing: -0.005em;
}

.option-arrow {

  height: 18px;

.welcome-subtitle {

.result-card::before {

  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: var(--color-primary);
}

.result-card.success::before { background: var(--color-success); }
.result-card.warning::before { background: var(--color-orange); }
.result-card.navy::before { background: var(--color-navy); }
.result-card.info::before { background: #3B7BBF; }

.btn:active { transform: scale(0.985); }

.btn-primary {

.footer {

  .option { padding: 15px 16px; font-size: 15px; }
  .content { padding: 20px 16px 24px; }
  .header { padding: 14px 16px 12px; }
  .footer { padding: 12px 16px 16px; }
}
</style>

function computeReturneeResult(answers) {
  const duration = answers['체류 기간'];
  const family = answers['동반 여부'];

  if (duration === '1년 이상') return 'result_b';
  if (duration === '6개월 이상 1년 미만' && family === '가족 동반') return 'result_b';

  return 'result_b2';
}

function sendToGoogleSheet(resultType, answers) {
  if (!LINKS.googleSheet) return;
  
  const data = {
    result: resultType,
    timestamp: new Date().toISOString()
  };
  
  Object.assign(data, answers);
  
  fetch(LINKS.googleSheet, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).catch(function(err) {
    console.log('구글 시트 전송 실패 (오프라인 또는 네트워크 오류):', err);
  });
}

let history = [];
let answers = {};
let currentScreen = 'q0';

const root = document.getElementById('screen-root');

function selectOption(option) {
  history.push({ screen: currentScreen, answers: Object.assign({}, answers) });
  if (option.answer) Object.assign(answers, option.answer);

  let nextScreen = option.next;
  if (typeof nextScreen === 'function') {
    nextScreen = nextScreen(answers);
  }
  currentScreen = nextScreen;
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  currentScreen = prev.screen;
  answers = prev.answers;
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function restart() {
  history = [];
  answers = {};
  currentScreen = 'q0';
  render();
  window.scrollTo({ top: 0, behavior: 'instant' });
}

function el(tag, className, content) {
  const node = document.createElement(tag);
  if (className) node.className = className;
  if (content !== undefined) node.innerHTML = content;
  return node;
}

const ARROW_ICON = '<svg class="option-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>';

const CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';

const EXTERNAL_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>';

const KAKAO_ICON = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3C6.48 3 2 6.58 2 11c0 2.83 1.83 5.31 4.59 6.74L5.5 21l3.93-2.34c.83.13 1.69.21 2.57.21 5.52 0 10-3.58 10-8s-4.48-7.87-10-7.87z"/></svg>';

const HOME_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';

const BACK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:13px;height:13px;"><polyline points="15 18 9 12 15 6"></polyline></svg>';

const COMPASS_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"></polygon></svg>';

function render() {
  const screen = SCREENS[currentScreen];
  root.innerHTML = '';

  if (screen.type === 'menu' || screen.type === 'question') {
    if (screen.progress) {
      const progress = el('div', 'progress-bar');
      for (let i = 1; i <= screen.progress.total; i++) {
        const dot = el('div', 'progress-dot');
        if (i < screen.progress.current) dot.classList.add('done');
        if (i === screen.progress.current) dot.classList.add('active');
        progress.appendChild(dot);
      }
      root.appendChild(progress);
    }

    if (history.length > 0) {
      const back = document.createElement('button');
      back.className = 'back-btn';
      back.innerHTML = BACK_ICON + '<span>이전</span>';
      back.onclick = goBack;
      root.appendChild(back);
    }

    const content = el('div', 'content');

    if (screen.type === 'menu') {
      const hero = el('div', 'welcome-hero');
      const emblem = el('div', 'welcome-emblem');
      emblem.innerHTML = COMPASS_ICON;
      hero.appendChild(emblem);
      hero.appendChild(el('div', 'welcome-title', screen.welcomeTitle));
      hero.appendChild(el('div', 'welcome-subtitle', screen.welcomeSubtitle));
      content.appendChild(hero);
    } else {
      if (screen.eyebrow) content.appendChild(el('div', 'eyebrow-ko', screen.eyebrow));
      content.appendChild(el('div', 'question', screen.question));
      if (screen.questionSub) content.appendChild(el('div', 'question-sub', screen.questionSub));
    }

    const opts = el('div', 'options');
    screen.options.forEach(function(option) {
      const btn = document.createElement('button');
      btn.className = 'option';
      const inner = '<div class="option-content"><div>' + option.label + '</div>' +
        (option.meta ? '<span class="option-meta">' + option.meta + '</span>' : '') +
        '</div>' + ARROW_ICON;
      btn.innerHTML = inner;
      btn.onclick = function() { selectOption(option); };
      opts.appendChild(btn);
    });
    content.appendChild(opts);

    root.appendChild(content);
    return;
  }

  if (screen.type === 'result') {
    sendToGoogleSheet(currentScreen, answers);
    
    const content = el('div', 'content');

    const card = el('div', 'result-card ' + (screen.style || ''));
    const badge = el('div', 'result-badge');
    badge.innerHTML = CHECK_ICON + '<span>' + screen.badge + '</span>';
    card.appendChild(badge);
    card.appendChild(el('div', 'result-label', screen.label));
    card.appendChild(el('div', 'result-summary', screen.summary));

    if (screen.info && screen.info.length) {
      const table = el('div', 'info-table');
      screen.info.forEach(function(row) {
        const r = el('div', 'info-row');
        r.appendChild(el('div', 'info-row-label', row[0]));
        r.appendChild(el('div', 'info-row-value', row[1]));
        table.appendChild(r);
      });
      card.appendChild(table);
    }

    if (screen.warningIf && screen.warningIf(answers)) {
      const w = el('div', 'warning-box', '<strong>주의:</strong> ' + screen.warning);
      card.appendChild(w);
    }

    content.appendChild(card);

    const answerKeys = Object.keys(answers);
    if (answerKeys.length > 0) {
      const summary = el('div', 'answer-summary');
      summary.appendChild(el('div', 'answer-summary-title', '고객이 선택한 답변'));
      answerKeys.forEach(function(key) {
        const row = el('div', 'answer-row');
        row.innerHTML = '<span class="answer-row-key">' + key + '</span><span class="answer-row-value">' + answers[key] + '</span>';
        summary.appendChild(row);
      });
      content.appendChild(summary);
    }

    const actions = el('div', 'actions');

    if (screen.primary) {
      const a = document.createElement('a');
      a.href = screen.primary.url;
      a.target = screen.primary.url.startsWith('tel:') ? '_self' : '_blank';
      a.rel = 'noopener';
      a.className = 'btn ' + (screen.primary.kakao ? 'btn-kakao' : 'btn-primary');
      const icon = screen.primary.kakao ? KAKAO_ICON : (screen.primary.url.startsWith('tel:') ? PHONE_ICON : EXTERNAL_ICON);
      a.innerHTML = icon + '<span>' + screen.primary.label + '</span>';
      actions.appendChild(a);
    }

    if (screen.secondary) {
      const a = document.createElement('a');
      a.href = screen.secondary.url;
      a.target = screen.secondary.url.startsWith('tel:') ? '_self' : '_blank';
      a.rel = 'noopener';
      a.className = 'btn ' + (screen.secondary.kakao ? 'btn-kakao' : 'btn-navy');
      const icon = screen.secondary.kakao ? KAKAO_ICON : (screen.secondary.url.startsWith('tel:') ? PHONE_ICON : EXTERNAL_ICON);
      a.innerHTML = icon + '<span>' + screen.secondary.label + '</span>';
      actions.appendChild(a);
    }

    actions.appendChild(el('div', 'divider'));

    const restartBtn = document.createElement('button');
    restartBtn.className = 'btn btn-ghost';
    restartBtn.innerHTML = HOME_ICON + '<span>처음으로 돌아가기</span>';
    restartBtn.onclick = restart;
    actions.appendChild(restartBtn);

    content.appendChild(actions);
    root.appendChild(content);
    return;
  }
}

render();
